<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Top ambient glow -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- Column 1 — Todo (Indigo) -->
  <rect x="4"    y="5" width="7" height="22" rx="2"   fill="rgba(255,255,255,0.05)"/>
  <rect x="4"    y="5" width="7" height="4.5" rx="2"  fill="#6366f1"/>
  <rect x="5"    y="12"  width="5" height="2.5" rx="1" fill="rgba(255,255,255,0.18)"/>
  <rect x="5"    y="16.5" width="5" height="2.5" rx="1" fill="rgba(255,255,255,0.11)"/>
  <rect x="5"    y="21"  width="3.5" height="2.5" rx="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Column 2 — In Progress (Amber) -->
  <rect x="12.5" y="5" width="7" height="22" rx="2"   fill="rgba(255,255,255,0.05)"/>
  <rect x="12.5" y="5" width="7" height="4.5" rx="2"  fill="#f59e0b"/>
  <rect x="13.5" y="12"  width="5" height="2.5" rx="1" fill="rgba(255,255,255,0.18)"/>
  <rect x="13.5" y="16.5" width="5" height="2.5" rx="1" fill="rgba(255,255,255,0.11)"/>

  <!-- Column 3 — Done (Green) -->
  <rect x="21"   y="5" width="7" height="22" rx="2"   fill="rgba(255,255,255,0.05)"/>
  <rect x="21"   y="5" width="7" height="4.5" rx="2"  fill="#22c55e"/>
  <rect x="22"   y="12"  width="5" height="2.5" rx="1" fill="rgba(255,255,255,0.18)"/>
</svg>
